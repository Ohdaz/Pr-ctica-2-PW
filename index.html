<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de frutas y verduras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="">
    <div class="container-fluid text-center">
        <div class="row align-items-start">
            <div class="col-2 bg-secondary-subtle vh-100">
                <div class="container">
                    <h1 class="pt-2">Práctica 2</h1>
                    <ul style="list-style: none; text-align: justify;">
                        <li class="pt-4">Inicio</li>
                        <li class="pt-4">Agregar productos</li>
                        <li class="pt-4">Listar productos</li>
                    </ul>
                </div>
            </div>
            <div class="col bg-white text-start vh100">
                <h1>Gestión de productos</h1>
                <h4>Registro y administración de inventario</h4>
                <form id="formularioRegistro" class="bg-white p-4 rounded shadow-sm">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="inventario" class="form-label fs-5">ID / Inventario</label>
                                <input type="number" class="form-control" id="inventario" required placeholder="Ej. 1">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="nombre" class="form-label fs-5">Nombre</label>
                                <input type="text" class="form-control" id="nombre" required placeholder="Ej. Manzana">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label for="categoria" class="form-label fs-5">Departamento</label>
                            <select id="categoria" class="form-select form-select-lg mb-3" name="categoria" required>
                                <option value="" selected disabled>Seleccione</option>
                                <option value="Frutas">Frutas</option>
                                <option value="Verduras">Verduras</option>
                                <option value="Lácteos">Lácteos</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" onclick="imprimirDatos(event);">Guardar
                        datos</button>
                </form>
                <div class="col-12 bg-white p-4 rounded shadow-sm text-center">
                    <h2>Listado</h2>
                    <div class="d-flex justify-content-center gap-4 mb-2 pt-2">
                        <button class="btn btn-outline-dark btn-sm p-2">Lista completa</button>
                        <button class="btn btn-outline-danger btn-sm">Frutas</button>
                        <button class="btn btn-outline-success btn-sm">Verduras</button>
                        <button class="btn btn-outline-primary btn-sm">Lácteos</button>
                        <button class="btn btn-outline-warning btn-sm">Ocultar productos</button>
                        <button class="btn btn-outline-danger btn-sm"
                            onclick="localStorage.clear(); location.reload();">
                            <i class="fa-solid fa-trash me-1"></i>Limpiar Todo
                        </button>
                    </div>
                    <hr>
                    <div id="content" class="row g-3">
                    </div>
                </div>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
            <script src="js/app.js"></script>
            <script>
                window.onload = function () {
                    if (typeof lista === 'function') {
                        lista();
                    }
                };
            </script>
</body>

</html>
