<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de frutas y verduras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="">
    <div class="container-fluid text-center">
        <div class="row align-items-start">
            <div class="col-2 bg-tertiary vh-100">
                <div class="container">
                    <h1>Práctica 2</h1>
                    <ul style="list-style: none;">
                        <li class="pt-4">Inicio</li>
                        <li class="pt-4">Agregar productos</li>
                        <li class="pt-4">Listar productos</li>
                    </ul>
                </div>
            </div>
            <div class="col bg-white text-start vh100">
                <h1>Gestión de productos</h1>
                <h4>Registro y administración de inventario</h4>
                <form id="formularioRegistro" class="bg-white p-4 rounded shadow-sm">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="nombre" class="form-label fs-5">ID / Inventario</label>
                                <input type="number" class="form-control" id="nombre" required placeholder="Ej. 1">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="cuenta" class="form-label fs-5">Nombre</label>
                                <input type="text" class="form-control" id="cuenta" required placeholder="Ej. Manzana">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label for="charla" class="form-label fs-5">Departamento</label>
                            <select id="charla" class="form-select form-select-lg mb-3" name="charla" required>
                                <option value="" selected disabled>Seleccione</option>
                                <option value="Frutas">Frutas</option>
                                <option value="Verduras">Verduras</option>
                                <option value="Lácteos">Lácteos</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" onclick="imprimirDatos(event);">Guardar
                        datos</button>
                </form>
                <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2>Listado</h2>
                        <button class="btn btn-outline-danger btn-sm"
                            onclick="localStorage.clear(); location.reload();">
                            <i class="fa-solid fa-trash me-1"></i>Limpiar Todo
                        </button>
                    </div>
                    <hr>

                    <div id="content" class="row g-3">
                    </div>
                </div>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
            <script src="js/app.js"></script>
            <script>
                window.onload = function () {
                    if (typeof lista === 'function') {
                        lista();
                    }
                };
            </script>
</body>

</html>
